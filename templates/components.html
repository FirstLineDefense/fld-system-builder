{% extends "base.html" %}

{% block content %}
<div class="card">
    <h2>Components</h2>

    <table>
        <tr>
            <th>Key</th>
            <th>Item</th>
            <th>Unit Cost</th>
            <th>Notes</th>
        </tr>

        {% for component in components or [] %}
        <tr>
            <td>{{ component.get('key','') }}</td>
            <td>{{ component.get('item','') }}</td>
            <td>{{ component.get('unit_cost',0)|money }}</td>
            <td>{{ component.get('notes','') }}</td>
        </tr>
        {% endfor %}

    </table>
</div>
{% endblock %}
